        // ─── Gemini API（含 Exponential Backoff）────────────────────────────────
        async function callGeminiAPI(userQuery, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { maxOutputTokens: 8192 }
            };
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(`HTTP ${response.status}: ${err.error?.message || '未知錯誤'}`);
                    }
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || '無回傳內容';
                } catch (e) {
                    if (i === retries) throw e;
                    await new Promise(r => setTimeout(r, delays[i]));
                }
            }
        }

        // ─── Markdown 解析器 ──────────────────────────────────────────────────────
        function parseMarkdown(md) {
            let html = md;

            // Tables
            html = html.replace(/(?:^\|.+\|[\r\n]+)+/gm, match => {
                const rows = match.trim().split('\n');
                let table = '<table>';
                rows.forEach((row, idx) => {
                    if (/^\|[\s\-:|]+\|$/.test(row.replace(/\s/g, ''))) return;
                    const cells = row.split('|').slice(1, -1);
                    table += '<tr>' + cells.map(c => {
                        const tag = idx === 0 ? 'th' : 'td';
                        return `<${tag}>${c.trim()}</${tag}>`;
                    }).join('') + '</tr>';
                });
                return table + '</table>';
            });

            // Blockquotes
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // Headings
            html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

            // HR
            html = html.replace(/^---+$/gm, '<hr>');

            // Bold
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Lists
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^\* (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            // 先把每個 <li> 行個別包進 <ul>，再合併相鄰的 </ul><ul>
            const UO = '\x3c' + 'ul\x3e', UC = '\x3c' + '/ul\x3e';
            html = html.replace(/^(<li>.+<\/li>)$/gm, UO + '$1' + UC);
            html = html.replace(new RegExp(UC + '\n' + UO, 'g'), '');

            // Paragraphs
            html = html.split('\n').map(line => {
                const t = line.trim();
                if (t && !t.startsWith('<') && !t.startsWith('|')) return `<p>${t}</p>`;
                return line;
            }).join('\n');

            return html;
        }

        // ─── UI 工具函式 ──────────────────────────────────────────────────────────
        function copyToClipboard() {
            const text = document.getElementById('output-content').innerText;
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                showToast('已複製全文至剪貼簿，可直接貼入 Word。');
            } catch {
                showToast('複製失敗，請手動框選複製。');
            }
            document.body.removeChild(ta);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3500);
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }
